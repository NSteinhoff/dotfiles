[general]
import = ["~/.config/alacritty/colors/gruvbox-dark.toml"]

[window]
option_as_alt = "OnlyLeft"

[terminal.shell]
args = ["--login"]
program = "/opt/homebrew/bin/bash"

[font]
size = 14
normal.family = "Iosevka Nerd Font Mono"
normal.style = "ExtraLight"
bold.style = "SemiBold"
italic.style = "ExtraLight Italic"
bold_italic.style = "SemiBold Italic"
# offset.y = 5

[[keyboard.bindings]]
key = "U"
mode = "Vi"
action = "ScrollHalfPageUp"

[[keyboard.bindings]]
key = "D"
mode = "Vi"
action = "ScrollHalfPageDown"

[[keyboard.bindings]]
key = "Q"
mode = "Vi"
action = "ToggleViMode"
